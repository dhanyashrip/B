<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* background with overlay */
body{
    height:100vh;
    background: url("1.jpg") no-repeat center center;
    background-size: cover; /* keeps image natural */
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* dark overlay for readability */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0, 0, 0, 0.016);
    top:0;
    left:0;
}

/* card */
.card{
    position:relative;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border-radius:15px;
    padding:40px 30px;
    width:400px;
    color:rgb(14, 13, 13);
    box-shadow:0 8px 30px rgba(0, 0, 0, 0.126);
    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.card h2{
    text-align:center;
    margin-bottom:25px;
}

/* input */
.input-group{
    position:relative;
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:12px 40px;
    border:none;
    border-radius:8px;
    outline:none;
    font-size:14px;
}

.input-group i{
    position:absolute;
    top:50%;
    left:12px;
    transform:translateY(-50%);
    color:#555;
}

/* button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#072b58);
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.remember{
    display:flex;
    align-items:center;
    font-size:13px;
    margin-top:12px;
}

.remember input{
    margin-right:6px;
}

.terms{
    font-size:12px;
    margin-top:15px;
    text-align:center;
}

.terms a{
    color:#fff;
    text-decoration:underline;
}
</style>

<!-- icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<div class="card">
    <h2>Welcome Back!!</h2>

    <div class="input-group">
        <i class="fa fa-envelope"></i>
        <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="input-group">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="Enter password">
    </div>

    <button onclick="login()">Sign In</button>

    <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember">Remember me</label>
    </div>

    <div class="terms">
        By continuing you agree to our  
        <a href="#">Terms & Privacy</a>
    </div>
</div>

<script>
function login() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    if (email === "" || pass === "") {
        alert("Please enter email and password");
        return;
    }

    if (email === "admin@gmail.com" && pass === "1234") {
        alert("Login Successful!");
        window.location.href = "file:///C:/Users/Dhanya/Desktop/block/dashboard.html";
    } else {
        alert("Invalid email or password");
    }
}
</script>

</body>
</html>
