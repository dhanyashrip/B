<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Medicines (Full System)</title>

<style>
body {
    font-family: Arial;
    background: #eef2f7;
    text-align: center;
}

.container {
    background: white;
    width: 65%;
    margin: 30px auto;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px gray;
}

input, select, button {
    padding: 10px;
    margin: 8px;
    width: 70%;
}

button {
    background: #072b58;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #0a3c7d;
}

.back-btn {
    width: 200px;
    background: #555;
}

.back-btn:hover {
    background: #333;
}

.low {
    color: red;
    font-weight: bold;
}

#trackingOutput {
    margin-top: 20px;
    background: #f1f1f1;
    padding: 15px;
    border-radius: 6px;
    text-align: left;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th {
    background: #072b58;
    color: white;
    padding: 12px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ccc;
}

tr:hover {
    background: #eef3f8;
}
</style>
</head>

<body>

<h1>Manage Medicines (Blockchain Tracking)</h1>

<div class="container">

    <!-- ADD -->
    <h3>Add Medicine</h3>
    <input type="text" id="id" placeholder="Medicine ID">
    <input type="text" id="name" placeholder="Medicine Name">
    <br>
    <button onclick="addMedicine()">Add</button>

    <!-- STOCK SECTION -->
    <h3>Add Stock</h3>
    <input type="text" id="stockId" placeholder="Medicine ID">
    <input type="number" id="stockQty" placeholder="Enter Quantity">
    <br>
    <button onclick="addStock()">Add Stock</button>

    <!-- UPDATE STAGE -->
    <h3>Update Supply Chain Stage</h3>
    <input type="text" id="updateId" placeholder="Medicine ID">
    
    <select id="stage">
        <option>Supplier</option>
        <option>Manufacturer</option>
        <option>Distributor</option>
        <option>Hospital</option>
        <option>Patient</option>
    </select>

    <br>
    <button onclick="updateStage()">Update Stage</button>

    <!-- DELETE -->
    <h3>Delete Medicine</h3>
    <input type="text" id="deleteId" placeholder="Medicine ID">
    <br>
    <button onclick="deleteMedicine()">Delete</button>

    <!-- TRACK -->
    <h3>Track Medicine</h3>
    <input type="text" id="trackId" placeholder="Enter Medicine ID">
    <br>
    <button onclick="trackMedicine()">Track</button>

    <div id="trackingOutput">
        <b>Tracking details will appear here...</b>
    </div>

    <!-- TABLE -->
    <h3>All Medicines</h3>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Stock</th>
                <th>Status</th>
                <th>Current Stage</th>
            </tr>
        </thead>
        <tbody id="medicineTable"></tbody>
    </table>

    <!-- BACK BUTTON -->
    <br><br>
    <button class="back-btn" onclick="goBack()">⬅ Back</button>

</div>

<script>

// Load blockchain
let blockchain = JSON.parse(localStorage.getItem("blockchain")) || [];

// Ensure stock exists
blockchain.forEach(med => {
    if (med.stock === undefined) {
        med.stock = 0;
    }
});

// Save data
function saveData() {
    localStorage.setItem("blockchain", JSON.stringify(blockchain));
}

// ADD
function addMedicine() {
    const id = document.getElementById("id").value.trim();
    const name = document.getElementById("name").value.trim();

    if (!id || !name) {
        alert("Enter all fields");
        return;
    }

    const exists = blockchain.find(m => m.id === id);
    if (exists) {
        alert("Already exists");
        return;
    }

    blockchain.push({
        id,
        name,
        stock: 0,
        history: ["Supplier"]
    });

    saveData();
    alert("Medicine added!");
    displayTable();
}

// UPDATE STOCK
function addStock() {
    const id = document.getElementById("stockId").value.trim();
    const qty = parseInt(document.getElementById("stockQty").value);

    const med = blockchain.find(m => m.id === id);

    if (!med) {
        alert("Medicine not found");
        return;
    }

    if (isNaN(qty) || qty < 0) {
        alert("Enter valid quantity");
        return;
    }

    med.stock = qty;

    saveData();
    alert("Stock added!");
    displayTable();
}

// UPDATE STAGE
function updateStage() {
    const id = document.getElementById("updateId").value.trim();
    const stage = document.getElementById("stage").value;

    const med = blockchain.find(m => m.id === id);

    if (!med) {
        alert("Medicine not found");
        return;
    }

    med.history.push(stage);

    saveData();
    alert("Stage updated!");
    displayTable();
}

// DELETE
function deleteMedicine() {
    const id = document.getElementById("deleteId").value.trim();

    blockchain = blockchain.filter(m => m.id !== id);

    saveData();
    alert("Deleted!");
    displayTable();
}

// TRACK
function trackMedicine() {
    const id = document.getElementById("trackId").value.trim();
    showTracking(id);
}

// CLICK TRACK
function trackMedicineByClick(id) {
    document.getElementById("trackId").value = id;
    showTracking(id);
}

// SHOW TRACKING
function showTracking(id) {
    const med = blockchain.find(m => m.id === id);
    const output = document.getElementById("trackingOutput");

    if (!med) {
        output.innerHTML = "<b>Medicine not found</b>";
        return;
    }

    let html = `<h3>${med.name} (${med.id})</h3>`;
    html += "<b>Supply Chain Flow:</b><br><br>";

    html += med.history.map((step, index) => {
        return `<span style="padding:8px 12px;background:#072b58;color:white;border-radius:20px;margin-right:5px;">
        ${step}</span>` 
        + (index < med.history.length - 1 ? " ➝ " : "");
    }).join("");

    html += "<br><br><b>Detailed History:</b><ul>";

    med.history.forEach(step => {
        html += `<li>${step}</li>`;
    });

    html += "</ul>";

    output.innerHTML = html;
}

// DISPLAY TABLE
function displayTable() {
    let table = document.getElementById("medicineTable");
    table.innerHTML = "";

    blockchain.forEach(med => {
        let currentStage = med.history[med.history.length - 1];

        let status = med.stock <= 10 
            ? "<span class='low'>Low</span>" 
            : "Available";

        let row = `<tr onclick="trackMedicineByClick('${med.id}')" style="cursor:pointer">
            <td>${med.id}</td>
            <td>${med.name}</td>
            <td>${med.stock}</td>
            <td>${status}</td>
            <td>${currentStage}</td>
        </tr>`;

        table.innerHTML += row;
    });
}

// BACK
function goBack() {
    window.location.href = "dashboard.html";
}

// INIT
displayTable();

</script>

</body>
</html>
