<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medicine Inventory</title>

<style>
body {
    font-family: Arial;
    background: #eef2f7;
    text-align: center;
}

.container {
    background: white;
    width: 70%;
    margin: 30px auto;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px gray;
}

input, button {
    padding: 10px;
    margin: 8px;
    width: 60%;
}

button {
    background: #072b58;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #0a3c7d;
}

.back-btn {
    width: 200px;
    background: #555;
}

.back-btn:hover {
    background: #333;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th {
    background: #072b58;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ccc;
}

.low {
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>Medicine Inventory</h1>

<div class="container">

    <h3>Update Stock</h3>
    <input type="text" id="medId" placeholder="Enter Medicine ID">
    <input type="number" id="quantity" placeholder="Enter Quantity">
    <br>
    <button onclick="updateStock()">Update Stock</button>

    <h3>Inventory List</h3>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Stock</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="inventoryTable"></tbody>
    </table>

    <!-- Back Button -->
    <br><br>
    <button class="back-btn" onclick="goBack()">⬅ Back</button>

</div>

<script>

// Load blockchain
let blockchain = JSON.parse(localStorage.getItem("blockchain")) || [];

// Add stock field if not exists
blockchain.forEach(med => {
    if (med.stock === undefined) {
        med.stock = 0;
    }
});

// Save function
function saveData() {
    localStorage.setItem("blockchain", JSON.stringify(blockchain));
}

// Update stock function
function updateStock() {
    const id = document.getElementById("medId").value.trim();
    const qty = parseInt(document.getElementById("quantity").value);

    const med = blockchain.find(m => m.id === id);

    if (!med) {
        alert("Medicine not found");
        return;
    }

    if (isNaN(qty) || qty < 0) {
        alert("Enter valid quantity");
        return;
    }

    med.stock = qty;

    saveData();
    alert("Stock updated!");
    displayInventory();
}

// Display inventory
function displayInventory() {
    let table = document.getElementById("inventoryTable");
    table.innerHTML = "";

    blockchain.forEach(med => {
        let status = med.stock <= 10
            ? "<span class='low'>Low Stock</span>"
            : "Available";

        let row = `
        <tr>
            <td>${med.id}</td>
            <td>${med.name}</td>
            <td>${med.stock}</td>
            <td>${status}</td>
        </tr>`;

        table.innerHTML += row;
    });
}

// Back button function
function goBack() {
    window.location.href = "dashboard.html"; // change page if needed
}

// Load table
displayInventory();

</script>

</body>
</html>
