<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medicine Supply Chain Chatbot</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #f5f7fa, #c3cfe2);
}

.chat-container {
    width: 420px;
    margin: 40px auto;
    background: white;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
    overflow: hidden;
}

.chat-header {
    background: #072b58;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 18px;
}

.chat-box {
    height: 350px;
    overflow-y: auto;
    padding: 10px;
}

.message {
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
    max-width: 75%;
}

.user {
    background: #d1e7ff;
    margin-left: auto;
    text-align: right;
}

.bot {
    background: #e2ffe2;
    margin-right: auto;
}

.input-area {
    display: flex;
    border-top: 1px solid #ccc;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
}

button {
    background: #072b58;
    color: white;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
}

button:hover {
    background: #0a3c7d;
}

/* Back Button */
.back-container {
    text-align: center;
    margin-top: 15px;
}

.back-btn {
    background: #555;
    padding: 10px 20px;
    border-radius: 5px;
}

.back-btn:hover {
    background: #333;
}
</style>

</head>

<body>

<div class="chat-container">
    <div class="chat-header">💊 Medicine Chatbot</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask about medicines..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<!-- Back Button -->
<div class="back-container">
    <button class="back-btn" onclick="goBack()">⬅ Back</button>
</div>

<script>

function handleKey(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
}

function sendMessage() {
    let input = document.getElementById("userInput").value.trim();
    let chatBox = document.getElementById("chatBox");

    if (input === "") return;

    chatBox.innerHTML += `<div class="message user">${input}</div>`;

    let response = getBotResponse(input.toLowerCase());

    setTimeout(() => {
        chatBox.innerHTML += `<div class="message bot">${response}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 500);

    document.getElementById("userInput").value = "";
}

function getBotResponse(input) {

    if (input.includes("track") || input.includes("order status")) {
        return "📦 You can track your medicine using its unique ID in the 'Track' section at dashboard.";
    }

    else if (input.includes("manufacturer")) {
        return "🏭 Manufacturer details are securely stored on blockchain and cannot be altered.";
    }

    else if (input.includes("supplier") || input.includes("distributor")) {
        return "🚚 Suppliers and distributors are verified in the system.";
    }

    else if (input.includes("fake") || input.includes("authentic")) {
        return "🔍 Each medicine has a unique ID. Verify authenticity using tracking.";
    }

    else if (input.includes("expiry")) {
        return "⏳ Expiry dates are monitored for safety.";
    }

    else if (input.includes("blockchain")) {
        return "🔗 Blockchain ensures transparency and security.";
    }

    else if (input.includes("price") || input.includes("cost")) {
        return "💰 Check inventory page for pricing.";
    }

    else if (input.includes("available") || input.includes("stock")) {
        return "📦 Check inventory section for stock availability.";
    }

    else if (input.includes("dosage")) {
        return "💊 Follow doctor's prescription for dosage.";
    }

    else if (input.includes("side effect")) {
        return "⚠️ Consult doctor for side effects.";
    }

    else if (input.includes("delivery")) {
        return "🚚 Delivery takes 2-5 days.";
    }

    else if (input.includes("return") || input.includes("refund")) {
        return "🔄 Return allowed only if damaged.";
    }

    else if (input.includes("prescription")) {
        return "📄 Prescription required for some medicines.";
    }

    else if (input.includes("hello") || input.includes("hi")) {
        return "👋 Hello! Ask me about tracking, stock, price, dosage, etc.";
    }

    else if (input.includes("help")) {
        return `💡 You can ask:
        <br>• Track order
        <br>• Price
        <br>• Availability
        <br>• Dosage
        <br>• Delivery`;
    }

    else {
        return "❓ Sorry, I didn't understand. Try asking about medicines.";
    }
}

// BACK FUNCTION
function goBack() {
    window.location.href = "dashboard.html"; // change if needed
}

</script>

</body>
</html>
