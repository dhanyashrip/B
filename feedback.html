<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medicine Supply Chain Feedback</title>

<style>
body {
    font-family: Arial;
    background: #eef2f7;
}

.container {
    width: 700px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
}

h2 {
    text-align: center;
    color: #072b58;
}

label {
    font-weight: bold;
}

/* Inputs */
input, textarea {
    width: 100%;
    margin: 8px 0 15px;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* Radio Buttons */
.options {
    margin-bottom: 15px;
    text-align: left;
}

.option-item {
    display: flex;
    align-items: center;
    margin: 5px 0;
}

.option-item input {
    width: auto;
    margin-right: 10px;
}

.option-item label {
    font-weight: normal;
}

/* Submit Button (Full Width) */
.submit-btn {
    width: 100%;
    padding: 10px;
    background: #072b58;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}

.submit-btn:hover {
    background: #1a5edb;
}

/* Back Button (Small) */
.back-btn {
    width: auto;
    padding: 8px 20px;
    background: #555;
    border-radius: 6px;
    display: block;
    margin: 15px auto 0;
}

.back-btn:hover {
    background: #333333f0;
}

.success {
    color: green;
    text-align: center;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">
    <h2>💊 Feedback Form</h2>

    <!-- Basic Info -->
    <label>Name</label>
    <input type="text" id="name" placeholder="Enter your name">

    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">

    <!-- Questions -->
    <label>1. How was your overall experience?</label>
    <div class="options">
        <div class="option-item"><input type="radio" name="exp" value="Excellent"><label>Excellent</label></div>
        <div class="option-item"><input type="radio" name="exp" value="Good"><label>Good</label></div>
        <div class="option-item"><input type="radio" name="exp" value="Average"><label>Average</label></div>
        <div class="option-item"><input type="radio" name="exp" value="Poor"><label>Poor</label></div>
    </div>

    <label>2. Was the system worth using?</label>
    <div class="options">
        <div class="option-item"><input type="radio" name="worth" value="Yes"><label>Yes</label></div>
        <div class="option-item"><input type="radio" name="worth" value="No"><label>No</label></div>
    </div>

    <label>3. Were you satisfied with the medicine tracking system?</label>
    <div class="options">
        <div class="option-item"><input type="radio" name="satisfy" value="Very Satisfied"><label>Very Satisfied</label></div>
        <div class="option-item"><input type="radio" name="satisfy" value="Satisfied"><label>Satisfied</label></div>
        <div class="option-item"><input type="radio" name="satisfy" value="Not Satisfied"><label>Not Satisfied</label></div>
    </div>

    <label>4. How easy was it to use the system?</label>
    <div class="options">
        <div class="option-item"><input type="radio" name="ease" value="Easy"><label>Easy</label></div>
        <div class="option-item"><input type="radio" name="ease" value="Moderate"><label>Moderate</label></div>
        <div class="option-item"><input type="radio" name="ease" value="Difficult"><label>Difficult</label></div>
    </div>

    <!-- Feedback -->
    <label>5. Additional Feedback</label>
    <textarea id="message" rows="4" placeholder="Write your suggestions..."></textarea>

    <!-- Submit Button -->
    <button class="submit-btn" onclick="submitFeedback()">Submit Feedback</button>

    <!-- Back Button -->
    <button class="back-btn" onclick="goBack()">⬅ Back</button>

    <div id="successMsg" class="success"></div>
</div>

<script>

function getSelectedValue(name) {
    let options = document.getElementsByName(name);
    for (let i = 0; i < options.length; i++) {
        if (options[i].checked) {
            return options[i].value;
        }
    }
    return "";
}

function submitFeedback() {
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let exp = getSelectedValue("exp");
    let worth = getSelectedValue("worth");
    let satisfy = getSelectedValue("satisfy");
    let ease = getSelectedValue("ease");
    let message = document.getElementById("message").value.trim();

    if (name === "" || email === "" || exp === "" || worth === "" || satisfy === "" || ease === "") {
        alert("Please fill all required fields");
        return;
    }

    console.log({ name, email, exp, worth, satisfy, ease, message });

    document.getElementById("successMsg").innerText = "✅ Feedback submitted successfully!";

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("message").value = "";

    document.querySelectorAll("input[type=radio]").forEach(r => r.checked = false);
}

// BACK FUNCTION
function goBack() {
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
